<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pandero — Laboratorio interactivo — Salvador Cassis</title>
  <meta name="description" content="Loop de pandero de cueca. Pieza de exploración rítmica con Web Audio.">

  <style>
    .lab-nav {
      padding: 2rem 1.5rem;
      border-bottom: 1px solid #e6ddd2;

    .lab-nav a {

    }

      font-size: 0.85rem;
      color: #7d6c5d;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .tag {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .tag-webaudio {
      background-color: #8b5e3c;
      color: #fff;
    }

    .tag-cueca {
      background-color: #5c6d8a;
      color: #fff;
    }

    .piece-footnote {
      font-size: 0.8rem;
      color: #7d6c5d;
      margin-top: 1rem;
    }

    @media (min-width: 768px) {
      .lab-nav {
        padding: 2.5rem 2rem;
      }
    }

<body>

  <nav class="lab-nav" aria-label="Volver al Laboratorio interactivo">

  <main>

    <section id="pieza">
      <h1>Pandero</h1>
      <div class="piece-meta">
        <time datetime="2026-03">marzo 2026</time>
        <span class="tag tag-webaudio">Web Audio</span>
        <span class="tag tag-cueca">Cueca</span>
      </div>
      <p>

  <footer>
    <p>© 2026 · Salvador Cassis</p>
